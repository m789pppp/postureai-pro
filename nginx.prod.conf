# ============================================================
# PostureAI Pro — Nginx Production Config
# Features: SSL/TLS, Rate limiting, Security headers,
#   CORS, Gzip, WebSocket proxy, Static file caching
# ============================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ua="$upstream_addr" '
                    'us="$upstream_status" uc="$upstream_cache_status"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    server_tokens      off;  # Hide nginx version

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml
        font/woff font/woff2;

    # ── Rate limiting zones ───────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m      rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=analysis:10m rate=20r/m;
    limit_req_zone  $binary_remote_addr zone=webhook:10m  rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── SSL ───────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Upstream ──────────────────────────────────────────────
    upstream backend {
        server backend:5050;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name postureai.io www.postureai.io;
        return 301 https://$host$request_uri;
    }

    # ── Certbot challenge ─────────────────────────────────────
    server {
        listen 80;
        server_name postureai.io www.postureai.io;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name postureai.io www.postureai.io;

        ssl_certificate     /etc/letsencrypt/live/postureai.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/postureai.io/privkey.pem;

        # ── Security headers ──────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "img-src 'self' data: blob: https:; "
            "font-src 'self' https://fonts.gstatic.com; "
            "connect-src 'self' https://api.postureai.io https://*.firebaseio.com wss://*.firebaseio.com; "
            "frame-src 'none'; "
            "object-src 'none';" always;

        # ── Connection limits ─────────────────────────────────
        limit_conn conn_limit 20;
        client_max_body_size 10M;

        # ── API proxy ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout   120s;
            proxy_read_timeout   120s;

            # Buffer settings for large analysis payloads
            proxy_buffer_size          16k;
            proxy_buffers              8 64k;
            proxy_busy_buffers_size    128k;
        }

        # ── Auth endpoints (stricter rate limit) ──────────────
        location ~ ^/api/(auth|login|register|reset-password) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Analysis endpoint ─────────────────────────────────
        location /api/analyze {
            limit_req zone=analysis burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 5M;
        }

        # ── Stripe webhook (higher rate, no limit) ────────────
        location /api/stripe/webhook {
            limit_req zone=webhook burst=50 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Do NOT buffer webhooks
            proxy_buffering off;
        }

        # ── WebSocket (Socket.IO) ─────────────────────────────
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # ── Health check (no logging) ─────────────────────────
        location /api/health {
            access_log off;
            proxy_pass http://backend;
        }

        # ── Frontend static (served by Vercel — this is fallback) ──
        location / {
            return 301 https://postureai.vercel.app$request_uri;
        }

        # ── Block common exploit patterns ─────────────────────
        location ~ /\. { deny all; }
        location ~ /\.git { deny all; }
        location ~ /\.env { deny all; }
        location ~ /(wp-admin|phpmyadmin|xmlrpc) { return 404; }
    }
}
