# PostureAI Pro — Docker Compose (Production)
# Usage:
#   Start all:     docker compose up -d
#   Build frontend: docker compose --profile build up frontend-build
#   Logs:          docker compose logs -f backend
#   Stop:          docker compose down

version: "3.9"

services:

  # ── Redis ─────────────────────────────────────────────────────────
  # Required for: rate limiting, session persistence, Gemini job queue
  redis:
    image: redis:7-alpine
    container_name: postureai_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 100
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - postureai_net

  # ── Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: postureai-backend:latest
    container_name: postureai_backend
    restart: unless-stopped
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env
    environment:
      # Override REDIS_URL to point at the redis container
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: production
    volumes:
      - ./reports:/app/reports
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - postureai_net

  # ── Frontend build (run once, outputs to ./frontend/dist) ─────────
  frontend-build:
    image: node:20-alpine
    container_name: postureai_frontend_build
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci --prefer-offline && npm run build"
    profiles: ["build"]
    networks:
      - postureai_net

  # ── Nginx (serves frontend + proxies /api to backend) ─────────────
  nginx:
    image: nginx:alpine
    container_name: postureai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - postureai_net

volumes:
  redis_data:
    name: postureai_redis_data
  backend_logs:
    name: postureai_backend_logs
  nginx_cache:
    name: postureai_nginx_cache

networks:
  postureai_net:
    name: postureai_net
    driver: bridge
