# PostureAI Pro — Fly.io deployment
# fly.io has free allowance: 3 shared-cpu VMs
# Deploy: fly launch --config fly.toml (from backend dir)

app = "postureai-backend"
primary_region = "fra"

[build]
  dockerfile = "backend/Dockerfile.prod"

[http_service]
  internal_port = 5050
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
