server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name postureai.io www.postureai.io;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(self), microphone=(), geolocation=()" always;
    # CSP: allow Firebase, MediaPipe CDN, Sentry, Stripe, Google Fonts
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' 'unsafe-inline' 'unsafe-eval'
           https://js.stripe.com
           https://cdn.jsdelivr.net
           https://browser.sentry-cdn.com
           https://www.gstatic.com
           https://apis.google.com;
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src 'self' https://fonts.gstatic.com;
         img-src 'self' data: blob: https:;
         media-src 'self' blob:;
         connect-src 'self'
           https://*.firebaseio.com
           https://*.googleapis.com
           https://*.sentry.io
           wss://*.firebaseio.com
           https://accept.paymob.com;
         frame-src https://js.stripe.com https://accept.paymob.com;
         worker-src 'self' blob:" always;

    # Gzip
    gzip on; gzip_types text/plain application/json application/javascript text/css;

    # Frontend (SPA)
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
    location ~* \.(js|css|png|jpg|svg|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /manifest.json { expires 1d; }
    location /sw.js         { add_header Cache-Control "no-cache"; expires 0; }

    # Backend API proxy
    location /api/ {
        proxy_pass         http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 5M;
    }
}
