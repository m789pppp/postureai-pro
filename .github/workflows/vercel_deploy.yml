name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: /api
          VITE_APP_NAME: "PostureAI Pro"

      - name: Deploy to Vercel
        id: deploy
        run: |
          cd frontend
          OUTPUT=$(vercel deploy dist --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --name=postureai-pro 2>&1) || true
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          # Write URL to file in repo
          cd ..
          echo "$URL" > LIVE_URL.txt
          git config user.email "bot@postureai.io"
          git config user.name "PostureAI Bot"
          git add LIVE_URL.txt
          git status
          git diff --staged
          git commit -m "live: $URL" --allow-empty
          git push origin main

      - name: Also update README with URL
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          sed -i "s|LIVE_URL_PLACEHOLDER|$URL|g" README.md || true
          echo "Live at: $URL" >> README.md
          git config user.email "bot@postureai.io"
          git config user.name "PostureAI Bot"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: live URL [skip ci]"
          git push origin main || true
