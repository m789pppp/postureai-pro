name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        run: |
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }} || true
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: /api
          VITE_APP_NAME: "PostureAI Pro"

      - name: Deploy to Vercel
        id: deploy
        working-directory: frontend
        run: |
          # Deploy with vercel.json for proper SPA routing
          RESULT=$(vercel deploy dist --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --name=postureai-pro-omega \
            --build-env SKIP_BUILD=1 2>&1) || \
          RESULT=$(vercel deploy --prod --yes --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1) || true
          echo "$RESULT"
          URL=$(echo "$RESULT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Write URL to file
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          echo "$DEPLOY_URL" > LIVE_URL.txt
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add LIVE_URL.txt
          git commit -m "chore: update live URL [skip ci]" || echo "nothing to commit"
          git push || echo "push failed"
