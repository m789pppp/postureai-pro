name: Deploy to Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Test token and capture error
        run: |
          echo "=== Vercel version ==="
          vercel --version
          echo "=== whoami ==="
          vercel whoami --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true
          echo "=== ls projects ==="
          vercel list --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | head -20 || true

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: /api
          VITE_APP_NAME: "PostureAI Pro"

      - name: Deploy and save result
        run: |
          cd frontend
          RESULT=$(vercel deploy dist --prod --token=${{ secrets.VERCEL_TOKEN }} --name=postureai-pro --yes 2>&1) || true
          echo "$RESULT" > /tmp/vercel_result.txt
          cd ..
          cp /tmp/vercel_result.txt VERCEL_DEPLOY_LOG.txt
          git config user.email "bot@postureai.io"
          git config user.name "PostureAI Bot"
          git add VERCEL_DEPLOY_LOG.txt
          git commit -m "debug: vercel deploy output [skip ci]" || true
          git push origin main || true
