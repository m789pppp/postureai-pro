name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: /api
          VITE_APP_NAME: "PostureAI Pro"

      - name: Deploy frontend dist to Vercel
        id: deploy
        working-directory: frontend
        run: |
          # Deploy just the dist folder as a static site + api/ folder as serverless
          OUTPUT=$(vercel deploy dist --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --name postureai-pro \
            2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ URL: $URL"

      - name: Save URL to repo
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "$URL" > VERCEL_URL.txt
          git config user.email "bot@postureai.io"
          git config user.name "PostureAI Bot"
          git add VERCEL_URL.txt
          git diff --staged --quiet || git commit -m "chore: vercel URL=$URL [skip ci]"
          git push origin main || true
