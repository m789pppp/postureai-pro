name: Deploy to Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: /api
          VITE_APP_NAME: "PostureAI Pro"

      - name: Deploy to Vercel
        id: deploy
        run: |
          cd frontend
          OUTPUT=$(vercel deploy dist --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --name=postureai-pro 2>&1)
          echo "--- OUTPUT ---"
          echo "$OUTPUT"
          echo "--- END ---"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "URL=$URL" > /tmp/deploy_result.txt
          echo "FULL_OUTPUT<<EOF" >> /tmp/deploy_result.txt
          echo "$OUTPUT" >> /tmp/deploy_result.txt
          echo "EOF" >> /tmp/deploy_result.txt
          mkdir -p /tmp/artifacts
          cp /tmp/deploy_result.txt /tmp/artifacts/

      - name: Upload URL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-deploy-url
          path: /tmp/artifacts/deploy_result.txt
          retention-days: 1
