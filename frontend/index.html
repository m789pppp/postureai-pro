      (function() {
        var PAGE_META = {
          '/product':       { title: 'Corvus Product — AI Posture Analysis Engine', desc: 'Explore the 5 layers of Corvus: 478-landmark AI analysis, HR dashboard, Groq AI coach, enterprise integrations, and AES-256 security.' },
          '/solutions':     { title: 'Corvus Solutions — For Every Industry & Team Size', desc: 'See how Corvus fits banking, tech, telecoms, and healthcare teams. Case studies with real results from Egypt and MENA.' },

          '/faq':           { title: 'Corvus FAQ — Everything You Need to Know', desc: 'Answers to 25+ questions on privacy, pricing, technical setup, HR integrations, and Arabic support.' },
        };
        var path = window.location.pathname;
        var meta = PAGE_META[path];
        if (meta) {
          document.title = meta.title;
          var d = document.querySelector('meta[name="description"]');
          if (d) d.setAttribute('content', meta.desc);
          var og = document.querySelector('meta[property="og:title"]');
          if (og) og.setAttribute('content', meta.title);
          var ogd = document.querySelector('meta[property="og:description"]');
          if (ogd) ogd.setAttribute('content', meta.desc);
          var tw = document.querySelector('meta[name="twitter:title"]');
          if (tw) tw.setAttribute('content', meta.title);
          var twd = document.querySelector('meta[name="twitter:description"]');
          if (twd) twd.setAttribute('content', meta.desc);
        }
      })();
    </script>

      <!-- Auto cache-clear on new deploy -->
    <script>
      (function(){
        var DEPLOY = "v583b5e9"; // updated each deploy
        var stored = localStorage.getItem("__corvus_deploy__");
        if(stored !== DEPLOY){
          localStorage.setItem("__corvus_deploy__", DEPLOY);
          if("serviceWorker" in navigator){
            navigator.serviceWorker.getRegistrations().then(function(regs){
              return Promise.all(regs.map(function(r){ return r.unregister(); }));
            }).then(function(){
              return caches.keys();
            }).then(function(keys){
              return Promise.all(keys.map(function(k){ return caches.delete(k); }));
            }).then(function(){
              if(stored !== null) window.location.reload(true); // only reload if was previously cached
            }).catch(function(){});
          }
        }
      })();
    </script>
