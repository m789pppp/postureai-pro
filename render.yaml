# PostureAI Pro — Render.com Blueprint
# Deploy: render.com → New → Blueprint → connect postureai-pro repo

services:
  - type: web
    name: postureai-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn.conf.py "backend:app"
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        value: 2e69c60c8a4bf195feaf54b372c15fa7cc0be7b8f0761ae146feb2fa22ae691e
      - key: APP_URL
        value: https://m789pppp.github.io/postureai-pro
      - key: ALLOWED_ORIGINS
        value: https://m789pppp.github.io,https://m789pppp.github.io/postureai-pro
      - key: ADMIN_EMAIL
        value: admin@postureai.io
      - key: SUPPORT_EMAIL
        value: support@postureai.io
      - key: ADMIN_PHONE
        value: "+201210271841"
      - key: WORK_HOURS_START
        value: 9
      - key: WORK_HOURS_END
        value: 18
      - key: CELERY_ENABLED
        value: false
      - key: SOCKETIO_ENABLED
        value: false
      # ── Add these manually in Render dashboard (secrets):
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PAYMOB_SECRET_KEY
        sync: false
      - key: PAYMOB_PUBLIC_KEY
        sync: false
      - key: PAYMOB_INTEGRATION_CARD
        sync: false
      - key: PAYMOB_INTEGRATION_WALLET
        sync: false
      - key: PAYMOB_IFRAME_ID
        sync: false
      - key: PAYMOB_HMAC_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
